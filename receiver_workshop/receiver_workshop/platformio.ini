; ═══════════════════════════════════════════════════════════════════
; PlatformIO Project — Receiver Workshop
; TTGO LoRa32 v2.1 — SD Card Logger + MQTT Publisher + Captive Portal
; ═══════════════════════════════════════════════════════════════════

[env:ttgo_lora32_v21]
platform  = espressif32
board     = ttgo-lora32-v21
framework = arduino

; ── Serial Monitor ──────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Upload ──────────────────────────────────────────────────────────
upload_speed = 921600

; ── Build flags ─────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Ukuran task MQTT/WiFi — defaultnya kadang terlalu kecil untuk TLS
    -DMQTT_MAX_PACKET_SIZE=1200

; ── Library Dependencies ────────────────────────────────────────────
; lib_deps =
;     ; LoRa
;     sandeepmistry/LoRa @ ^0.8.0

;     ; OLED
;     adafruit/Adafruit SSD1306 @ ^2.5.9
;     adafruit/Adafruit GFX Library @ ^1.11.9

;     ; MQTT
;     knolleary/PubSubClient @ ^2.8.0

;     ; JSON
;     bblanchon/ArduinoJson @ ^7.0.0

;     ; SD + FS sudah built-in Arduino ESP32 core, tidak perlu deklarasi
;     ; WiFi, HTTPClient, WiFiClientSecure juga built-in

; ; ── Partition — butuh ruang untuk TLS + SD + JSON ───────────────────
board_build.partitions = default.csv
