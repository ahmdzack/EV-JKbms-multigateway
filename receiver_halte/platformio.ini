; ═══════════════════════════════════════════════════════════════════
; PlatformIO Project — Receiver Halte
; TTGO LoRa32 v2.1 — Captive Portal (browser config) + MQTT TLS
; Tanpa SD Card — konfigurasi WiFi/MQTT via browser (Access Point)
; ═══════════════════════════════════════════════════════════════════

[env:ttgo_lora32_v21]
platform  = espressif32
board     = ttgo-lora32-v21
framework = arduino

; ── Serial Monitor ──────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ── Upload ──────────────────────────────────────────────────────────
upload_speed = 921600

; ── Build flags ─────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DMQTT_MAX_PACKET_SIZE=1200

; ── Library Dependencies ────────────────────────────────────────────
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^7.0.0
    ; WiFi, WebServer, Preferences, WiFiClientSecure — built-in ESP32 core

board_build.partitions = default.csv
